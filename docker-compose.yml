services:
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama

  app:
    build: .
    container_name: llm-eval-app
    environment:
      - OLLAMA_HOST=http://ollama:11434
      - EMB_MODEL_NAME=all-MiniLM-L6-v2
      - DB_PATH=/app/data/evals.db
    ports:
      - "5000:5000"
    depends_on:
      - ollama
    volumes:
      - ./data:/app/data

volumes:
  ollama_data: